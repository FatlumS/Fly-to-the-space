<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orbit Rush</title>
  <link rel="stylesheet" href="/css/animations.css">
  <style>
    :root {
      --bg: #0a0a2e;
      --panel: #12123d;
      --panel-2: #18184a;
      --blue: #00d4ff;
      --orange: #ff6b35;
      --green: #3dff9a;
      --red: #ff426d;
      --text: #f4f7ff;
      --muted: #9aa7d9;
      --line: rgba(0, 212, 255, 0.22);
      --shadow: 0 18px 48px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 10%, rgba(0, 212, 255, 0.16), transparent 28%),
        radial-gradient(circle at 85% 20%, rgba(255, 107, 53, 0.14), transparent 26%),
        var(--bg);
    }

    button,
    input {
      font: inherit;
    }

    button {
      min-height: 44px;
      border: 0;
      color: var(--text);
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    button:active {
      transform: translateY(1px) scale(0.99);
    }

    .app {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      margin: 0 auto;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 12px;
      padding: 12px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(18, 18, 61, 0.88);
      box-shadow: var(--shadow);
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .brand h1 {
      margin: 0;
      color: var(--blue);
      font-size: 1.15rem;
      letter-spacing: 0;
    }

    .status {
      color: var(--muted);
      font-size: 0.78rem;
    }

    .balance {
      min-width: 132px;
      padding: 9px 10px;
      border: 1px solid rgba(61, 255, 154, 0.35);
      border-radius: 8px;
      color: var(--green);
      background: rgba(61, 255, 154, 0.08);
      font-weight: 800;
      text-align: right;
      white-space: nowrap;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      min-height: 0;
    }

    .game-card,
    .feed,
    .history,
    .bet-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(18, 18, 61, 0.9);
      box-shadow: var(--shadow);
    }

    .game-card {
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 360px;
    }

    .game-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px;
      color: var(--muted);
      font-size: 0.84rem;
      position: relative;
      z-index: 10;
    }

    .phase-pill {
      min-height: 28px;
      padding: 5px 9px;
      border: 1px solid rgba(255, 107, 53, 0.42);
      border-radius: 999px;
      color: var(--orange);
      background: rgba(255, 107, 53, 0.1);
      font-weight: 800;
    }

    .game-stage {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 300px;
      overflow: hidden;
    }

    #gameCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .multiplier-wrap {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-align: center;
      pointer-events: none;
      z-index: 2;
    }

    .multiplier {
      color: var(--blue);
      font-size: clamp(4rem, 22vw, 6.6rem);
      font-weight: 900;
      line-height: 0.95;
      text-shadow: 0 0 24px rgba(0, 212, 255, 0.62);
    }

    .flight-copy {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .side-stack {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    details.history {
      overflow: hidden;
    }

    details.history summary {
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      color: var(--blue);
      cursor: pointer;
      font-weight: 800;
      list-style: none;
    }

    details.history summary::-webkit-details-marker {
      display: none;
    }

    .history-list,
    .feed-list {
      display: grid;
      gap: 8px;
      max-height: 190px;
      margin: 0;
      padding: 0 12px 12px;
      overflow-y: auto;
      list-style: none;
    }

    .history-list li,
    .feed-list li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 36px;
      padding: 8px 10px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.045);
      color: var(--muted);
      font-size: 0.86rem;
    }

    .history-list strong {
      color: var(--orange);
    }

    .feed {
      padding: 12px;
      position: relative;
      z-index: 10;
    }

    .feed h2 {
      margin: 0 0 10px;
      color: var(--blue);
      font-size: 0.95rem;
    }

    .feed-list {
      max-height: 148px;
      padding: 0;
    }

    .feed-list strong {
      color: var(--text);
    }

    .bet-panel {
      display: grid;
      gap: 12px;
      padding: 12px;
      position: relative;
      z-index: 10;
    }

    .inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
    }

    input {
      min-height: 48px;
      width: 100%;
      border: 1px solid rgba(0, 212, 255, 0.28);
      border-radius: 8px;
      padding: 0 12px;
      color: var(--text);
      background: rgba(5, 8, 34, 0.86);
      outline: none;
      transition: border 160ms ease, box-shadow 160ms ease;
    }

    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.15);
    }

    input.error {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(255, 66, 109, 0.15);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .primary {
      border-radius: 8px;
      background: linear-gradient(135deg, var(--blue), #0077ff);
      box-shadow: 0 10px 26px rgba(0, 212, 255, 0.24);
      font-weight: 900;
    }

    .primary.cashout {
      background: linear-gradient(135deg, var(--orange), #ffb000);
      box-shadow: 0 10px 26px rgba(255, 107, 53, 0.24);
    }

    .primary.pulse {
      animation: pulse 0.6s ease-in-out infinite;
    }

    .secondary {
      border: 1px solid rgba(255, 107, 53, 0.45);
      border-radius: 8px;
      color: var(--orange);
      background: rgba(255, 107, 53, 0.08);
      font-weight: 900;
    }

    .secondary[hidden] {
      display: none;
    }

    .shake {
      animation: shake 0.5s;
    }

    .win-pulse {
      animation: winPulse 1s ease-out;
    }

    @media (min-width: 760px) {
      .app {
        max-width: 800px;
        grid-template-rows: auto 1fr;
      }

      .layout {
        grid-template-columns: minmax(0, 1fr) 260px;
        align-items: start;
      }

      .game-card {
        min-height: 460px;
      }

      .game-stage {
        min-height: 390px;
      }

      details.history {
        display: block;
      }

      details.history summary {
        cursor: default;
      }

      .history-list {
        max-height: 260px;
      }

      .feed-list {
        max-height: 210px;
      }

      .bet-panel {
        grid-column: 1 / -1;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <h1>ORBIT RUSH</h1>
        <div class="status" id="game-status">Next round starting in 5...</div>
      </div>
      <div class="balance" id="balance-display">1000.00</div>
    </header>

    <main class="layout">
      <section class="game-card" id="game-container" aria-label="Game area">
        <div class="game-meta">
          <span id="roundLabel">Round pending</span>
          <span class="phase-pill" id="phaseLabel">BETTING</span>
        </div>
        <div class="game-stage">
          <canvas id="gameCanvas" aria-label="Spaceship animation"></canvas>
          <div class="multiplier-wrap">
            <div class="multiplier" id="multiplier-display">1.00x</div>
            <div class="flight-copy" id="countdown-timer" style="display:none;">Launch in 5...</div>
          </div>
        </div>
      </section>

      <aside class="side-stack">
        <details class="history" open>
          <summary>
            <span>Round History</span>
            <span>20</span>
          </summary>
          <ol class="history-list" id="history-sidebar">
            <li><span>Waiting for results</span><strong>--</strong></li>
          </ol>
        </details>

        <section class="feed" aria-label="Live player feed">
          <h2>Live Feed</h2>
          <ul class="feed-list" id="social-feed">
            <li><strong>System</strong><span>Ready for launch</span></li>
          </ul>
        </section>
      </aside>

      <section class="bet-panel" aria-label="Bet controls">
        <div class="inputs">
          <label>
            Bet Amount
            <input id="bet-amount" type="number" min="1" max="10000" step="1" value="10">
          </label>
          <label>
            Auto Cashout
            <input id="auto-cashout" type="number" min="1.01" max="1000" step="0.01" placeholder="Optional">
          </label>
        </div>
        <div class="actions">
          <button class="primary" id="place-bet-btn" type="button">PLACE BET</button>
          <button class="secondary" id="cashout-btn" type="button" hidden>CASH OUT</button>
        </div>
      </section>
    </main>
  </div>

  <!-- Socket.io -->
  <script src="/socket.io/socket.io.js"></script>
  
  <!-- Game Renderer -->
  <script src="/js/renderer.js"></script>
  
  <!-- Game Client -->
  <script src="/js/gameClient.js"></script>

  <!-- Initialization -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const canvas = document.getElementById('gameCanvas');
      const renderer = new GameRenderer(canvas);
      renderer.init();
      
      const client = new OrbitRushClient(renderer);
      client.init();
    });
  </script>
</body>
</html>
